<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting — ProjectCare</title>
  <script>
    // Preserve ?data= and ?session= params across redirect to new canonical path
    var dest = '/projectcare/saco/plot/' + window.location.search;
    window.location.replace(dest);
  </script>
</head>
<body>
  <p>Redirecting to <a id="l" href="/projectcare/saco/plot/">SACO Plot</a>…</p>
  <script>document.getElementById('l').href = '/projectcare/saco/plot/' + window.location.search;</script>
</body>
</html>
